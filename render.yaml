services:
  - type: web
    name: preoracle-worker
    runtime: node
    rootDir: apps/worker
    buildCommand: npm install -g bun && bun install && bun run build
    startCommand: bun run start
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: preoracle-db
          property: connectionString
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: WEB_URL
        sync: false
      - key: NODE_ENV
        value: production

databases:
  - name: preoracle-db
    plan: free
    databaseName: preoracle
    user: preoracle
